<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillClash AI Arena</title>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=100"></script>
</head>
<body>
    <h1 id="status">CONNECTING TO PI...</h1>
    <button onclick="triggerPiPayment()" id="playBtn" style="display:none; padding: 12px 24px; font-size: 16px; cursor: pointer;">PLAY TRIVIA (0.1 Pi)</button>

    <script>
        let sdkTimer = setTimeout(() => {
            if(document.getElementById('status').innerText.includes("CONNECTING")) {
                document.getElementById('status').innerText = "READY (SANDBOX MODE)";
                document.getElementById('playBtn').style.display = "block";
            }
        }, 3000);

        try {
            Pi.init({ version: "2.0", sandbox: true });
            
            Pi.authenticate(['username', 'payments'], function(auth) {
                clearTimeout(sdkTimer);
                document.getElementById('status').textContent = "PILOT: " + auth.user.username;
                document.getElementById('playBtn').style.display = "block";
            }, function(err) {
                clearTimeout(sdkTimer);
                document.getElementById('status').textContent = "AUTH ERROR: " + err;
                document.getElementById('playBtn').style.display = "block";
            });
        } catch (e) {
            clearTimeout(sdkTimer);
            document.getElementById('status').textContent = "INIT ERROR: " + e;
            document.getElementById('playBtn').style.display = "block";
        }

        function triggerPiPayment() {
            if (typeof Pi === 'undefined' || !Pi.createPayment) {
                alert("Pi SDK not fully loaded yet.");
                return;
            }

            const paymentData = {
                amount: 0.1,
                memo: "SkillClash AI Entry",
                metadata: { gameType: "trivia" }
            };

            const callbacks = {
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Ready for server completion. TXID: " + txid);
                },
                onCancel: function(paymentId) {
                    alert("Payment cancelled.");
                },
                onError: function(error, payment) {
                    alert("Payment error occurred.");
                },
                onIncompletePaymentFound: function(payment) {
                    alert("Incomplete payment found.");
                }
            };

            try {
                Pi.createPayment(paymentData, callbacks);
            } catch (err) {
                alert("Creation caught: " + err);
            }
        }
    </script>
</body>
</html>
