<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillClash AI Arena</title>
    
    <!-- PI PLATFORM GATEWAY -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        :root {
            --bg-dark: #050914;
            --card-bg: #0c1322;
            --neon-green: #39ff14;
            --text-main: #ffffff;
            --text-muted: #7e8fa9;
            --play-counter: #00d2ff;
            --locked-grey: #2a364d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 16px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-wrapper { max-width: 440px; width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .brand-title {
            font-size: 2rem; font-weight: 900; text-align: center; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--neon-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .game-card-row {
            background-color: var(--card-bg); border-radius: 20px; padding: 16px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .btn-play-action {
            background: linear-gradient(180deg, #5dfd2d 0%, #17b302 100%);
            color: #03060d; font-weight: 900; padding: 10px 20px; border-radius: 12px; cursor: pointer;
        }

        .screen-instance { display: none; }
        .screen-instance.active-layer { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="brand-header">
            <h1 class="brand-title">SkillClash AI</h1>
            <div id="platform-status-text" style="text-align:center; font-size: 0.7rem; color: var(--neon-green);">INITIALIZING...</div>
        </div>

        <div id="layer-lobby" class="screen-instance active-layer">
            <div class="game-card-row">
                <div>
                    <h3>AI Trivia Arena</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Entry: 0.1 Pi Testnet Stake</p>
                </div>
                <button class="btn-play-action" onclick="launchActiveSpotlightQuiz()">PLAY</button>
            </div>
        </div>
    </div>

    <script>
        // OFFICIAL PI INTEGRATION
        function initializePiPlatform() {
            try {
                if (typeof Pi !== 'undefined') {
                    // Initialized with your specific App ID
                    Pi.init({ version: "2.0", sandbox: true, appID: "skillclash-ai-arena-2wnc" });
                    console.log("SkillClash Platform Pipeline Initialized.");
                    authenticatePiPlayer();
                } else {
                    document.getElementById('platform-status-text').textContent = "SDK NOT DETECTED";
                }
            } catch (error) {
                console.error("Initialization error:", error);
            }
        }

        function authenticatePiPlayer() {
            Pi.authenticate(['username', 'payments'], function(auth) {
                document.getElementById('platform-status-text').textContent = `PILOT: ${auth.user.username.toUpperCase()}`;
            }).catch(function(err) {
                console.error("Auth aborted", err);
            });
        }

        function launchActiveSpotlightQuiz() {
            // Payment logic specifically for Testnet
            Pi.createPayment({
                amount: 0.1,
                memo: "SkillClash AI Entry",
                metadata: { gameType: "trivia" },
            }, {
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Payment Success! TX: " + txid);
                },
                onCancel: function() { alert("Payment cancelled."); },
                onError: function(err) { alert("Error: " + err); }
            });
        }

        window.addEventListener('DOMContentLoaded', initializePiPlatform);
    </script>
</body>
</html>
