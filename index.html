<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillClash AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <div id="app-container">
        <header>
            <h1>SkillClash AI</h1>
            <div id="auth-status">Connecting to Pi Network...</div>
            <button id="signin-btn" style="display: none;">Sign In with Pi</button>
        </header>

        <main id="game-arena" style="display: none;">
            <div class="welcome-box">
                <h2>Welcome, <span id="player-username">Player</span>!</h2>
                <p>Select a node to begin tournament trivia.</p>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
