<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1 id="status">CONNECTING...</h1>
    <button onclick="pay()">PLAY TRIVIA</button>

    <script>
        // Force immediate init
        Pi.init({ version: "2.0", sandbox: true, appID: "skillclash-ai-arena-2wnc" });
        
        Pi.authenticate(['username', 'payments'], (auth) => {
            document.getElementById('status').textContent = "PILOT: " + auth.user.username;
        }).catch((err) => {
            document.getElementById('status').textContent = "AUTH FAILED: " + err;
        });

        function pay() {
            Pi.createPayment({
                amount: 0.1,
                memo: "SkillClash AI Entry",
                metadata: { gameType: "trivia" }
            }, {
                onReadyForServerCompletion: (pid, txid) => alert("Success: " + txid),
                onCancel: () => alert("Cancelled"),
                onError: (err) => alert("Error: " + err)
            });
        }
    </script>
</body>
</html>
